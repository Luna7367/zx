<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Contact Us</title>
</head>
<body>
    <nav class="top-bar">
        <div class="nav-brand">Contact us</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="menu.html">Menu</a>
        </div>
    </nav>

    <div class="main-container">
        <!-- Contact Form Section -->
        <!-- Link to Web3Forms API for form submission functionality -->
        <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
            <div class="contact-title">
                <h1>Connect With Us</h1>
                <hr>
            </div>
            <input type="hidden" name="access_key" value="319c5b54-0571-480c-8f35-821b3651e993">
            <input id ="name" type="text" name="name" placeholder="Enter Your Name" class="user-inputs" required>
            <input id ="email" type="email" name="email" placeholder="Enter Your Email" class="user-inputs" required>
            <input id ="phone" type="tel" name="phone" placeholder="Enter Your Phone Number" class="user-inputs">
            <textarea id="message" name="message" placeholder="Your Message" class="user-inputs textarea" required></textarea>
            
            <button type="submit" class="submit-button">Send Message</button>
        </form>

        <!-- Contact Info Section -->
        <div class="info-and-image">
            <div class="contact-info">
                <div class="info-card">
                    <h3>Location</h3>
                    <p>Coffee Shop<br>Belfast, Northern Ireland</p>
                </div>
                <div class="info-card">
                    <h3>Email</h3>
                    <p>YourEsprosso@Gmail.com</p>
                </div>
                <div class="info-card">
                    <h3>Phone</h3>
                    <p>+44 123-4567</p>
                </div>
            </div>
            <img src="Images/Coffee.png" alt="Coffee" class="coffee-image">
        </div>
    </div>
</body>
</html>
